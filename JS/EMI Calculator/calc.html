<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
    <link rel="stylesheet" href="/JS/EMI Calculator/calc.css">
</head>
<body>
    <div>
        <h1>EMI-Calculator</h1>
        <div class="input-group">
            <label for="loan-amount">Loan Amount</label>
            <input type="range" id="loan-amount" min="50000" max="500000000" value="1000000" step="50000">
            <span id="loan-amount-display">$ 1,000,000</span>
        </div>
        <div class="input-group">
            <label for="interest-rate">Interest Rate</label>
            <input type="range" id="interest-rate" min="1" max="60" value="5" step="0.5">
            <span id="interest-rate-display">5%</span>
        </div>
        <div class="input-group">
            <label for="loan-tenure">Loan Tenure</label>
            <input type="range" id="loan-tenure" min="1" max="30" value="5">
            <span id="loan-tenure-display">5 Yrs</span>
        </div>
        <div class="result">
            <h3>Monthly EMI: $ <span id="emi-result">19,566</span></h3>
        </div>
        
    </div>
    <script src="calc.js"></script>
</body>
</html>
